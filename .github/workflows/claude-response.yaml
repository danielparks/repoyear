# WARNING: These triggers allow collaborators to ping @claude on third party PRs
# and issues without any other protection against prompt injection. If you do
# not trust your collaborators to be extremely careful, then do not use this!

# WARNING: This assumes that anybody who can assign issues is trusted.

name: Claude
on:
  issues:
    types: [opened, edited, assigned]
  issue_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited]
  pull_request_review_comment:
    types: [created, edited]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  respond:
    name: Respond
    if: |
      (
        contains(
          fromJSON('["OWNER", "COLLABORATOR"]'),
          github.event.issue.author_association ||
          github.event.comment.author_association ||
          github.event.review.author_association
        ) &&
        (
          contains(github.event.issue.body, '@claude') ||
          contains(github.event.issue.title, '@claude') ||
          contains(github.event.comment.body, '@claude') ||
          contains(github.event.review.body, '@claude')
        )
      ) ||
      (
        github.event_name == 'issues' &&
        github.event.action == 'assigned' &&
        github.event.assignee.login == 'claude[bot]'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read # Read files in private repos
      pull-requests: write # Write PR comments
      id-token: write # Coordinate with Claude app
      issues: write # Write issue comments
      actions: read # Read GitHub action results
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
