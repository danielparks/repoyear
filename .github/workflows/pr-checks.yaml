name: Checks

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# These would more naturally be separate jobs, but GitHub actions “bills” each
# job separately and rounds up to the next minute, so four 10 second jobs “cost”
# my account 4 action minutes.
jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write # SARIF reporting for zizmor

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          cache: true

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: stable
          components: clippy

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: nightly
          components: rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: taiki-e/install-action@60ae4ce63c7aeb6e96d7f572c1ec7fafbb17ca80 # v2.79.10
        with:
          tool: cargo-msrv

      - run: deno install --frozen

      - uses: crate-ci/typos@7b04f660f4ee4f048d18fd341887cf28dfbedfe2 # v1.46.3
        if: ${{ !cancelled() }}

      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        if: ${{ !cancelled() }}

      - name: deno check
        if: ${{ !cancelled() }}
        run: deno check

      - name: deno fmt
        if: ${{ !cancelled() }}
        run: deno fmt --check

      - name: deno lint
        if: ${{ !cancelled() }}
        run: deno lint

      - name: deno test
        if: ${{ !cancelled() }}
        run: deno test

      - name: vitest
        if: ${{ !cancelled() }}
        run: deno run vitest:run

      - uses: actions-rust-lang/rustfmt@4066006ec54a31931b9b1fddfd38f2fdf2d27143 # v1.1.2
        if: ${{ !cancelled() }}

      - uses: EmbarkStudios/cargo-deny-action@a531616d8ce3b9177443e48a1159bc945a099823 # v2.0.19
        if: ${{ !cancelled() }}
        with:
          rust-version: "1.85.0"
          manifest-path: backend/Cargo.toml

      - name: cargo clippy
        if: ${{ !cancelled() }}
        run: cargo +stable clippy --all-features --all-targets

      - name: cargo doc lints
        if: ${{ !cancelled() }}
        env:
          RUSTDOCFLAGS: --document-private-items -Dwarnings
        run: cargo +stable doc --no-deps --all-features

      - name: cargo msrv
        if: ${{ !cancelled() }}
        working-directory: backend
        run: cargo msrv verify

      - name: cargo build
        id: cargo_build
        if: ${{ !cancelled() }}
        run: cargo +stable build --tests --all-features

      - name: cargo test
        if: ${{ !cancelled() && steps.cargo_build.outcome == 'success' }}
        run: cargo +stable test --all-features
