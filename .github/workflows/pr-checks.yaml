name: Checks

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# These would more naturally be separate jobs, but GitHub actions “bills” each
# job separately and rounds up to the next minute, so four 10 second jobs “cost”
# my account 4 action minutes.
jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write # SARIF reporting for zizmor

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          cache: true

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: stable
          components: clippy

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: nightly
          components: rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: taiki-e/install-action@56545b37b57562edd73171cb6c62cc509db4c34e # v2.81.7
        with:
          tool: cargo-msrv

      - run: deno install --frozen

      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2
        if: ${{ !cancelled() }}

      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        if: ${{ !cancelled() }}

      - name: deno check
        if: ${{ !cancelled() }}
        run: deno check

      - name: deno fmt
        if: ${{ !cancelled() }}
        run: deno fmt --check

      - name: deno lint
        if: ${{ !cancelled() }}
        run: deno lint

      - name: deno test
        if: ${{ !cancelled() }}
        run: deno test

      - name: vitest
        if: ${{ !cancelled() }}
        run: deno run vitest:run

      - uses: actions-rust-lang/rustfmt@4066006ec54a31931b9b1fddfd38f2fdf2d27143 # v1.1.2
        if: ${{ !cancelled() }}

      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        if: ${{ !cancelled() }}
        with:
          rust-version: "1.85.0"
          manifest-path: backend/Cargo.toml

      - name: cargo clippy
        if: ${{ !cancelled() }}
        run: cargo +stable clippy --all-features --all-targets

      - name: cargo doc lints
        if: ${{ !cancelled() }}
        env:
          RUSTDOCFLAGS: --document-private-items -Dwarnings
        run: cargo +stable doc --no-deps --all-features

      - name: cargo msrv
        if: ${{ !cancelled() }}
        working-directory: backend
        run: cargo msrv verify

      - name: cargo build
        id: cargo_build
        if: ${{ !cancelled() }}
        run: cargo +stable build --tests --all-features

      - name: cargo test
        if: ${{ !cancelled() && steps.cargo_build.outcome == 'success' }}
        run: cargo +stable test --all-features
