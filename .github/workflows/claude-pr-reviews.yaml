# DANGER: see the WARNINGs in this file before enabling this workflow.

name: Claude
on:
  # Run on pull requests automatically.
  pull_request:
    # synchronize currently disabled for cost reasons.
    types: [opened, reopened, ready_for_review]

  # WARNING: These triggers allow collaborators to ping @claude on third party
  # PRs and issues without any other protection against prompt injection. If you
  # do not trust your collaborators to be extremely careful, then disable all
  # the triggers below.
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  issues:
    types: [opened, edited, assigned]
  pull_request_review:
    types: [submitted, edited]

jobs:
  review:
    # WARNING: This assumes that anybody who can assign issues is trusted.
    if: |
      (
        contains(
          fromJSON('["OWNER", "COLLABORATOR"]'),
          github.event.pull_request.author_association ||
          github.event.comment.author_association ||
          github.event.review.author_association ||
          github.event.issue.author_association
        ) &&
        (
          github.event_name == 'pull_request' ||
          contains(github.event.comment.body, '@claude') ||
          contains(github.event.review.body, '@claude') ||
          contains(github.event.issue.body, '@claude') ||
          contains(github.event.issue.title, '@claude')
        )
      ) ||
      (
        github.event_name == 'issues' &&
        github.event.action == 'assigned' &&
        github.event.assignee.login == 'claude[bot]'
      )
    runs-on: ubuntu-latest
    permissions:
      # contents: write is not safe without branch protection rules
      contents: read
      pull-requests: write
      id-token: write
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Render PR discussion
        id: render
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        # WARNING: gh-pr-render is not pinned to a version here
        run: |
          {
            echo "pr_context<<EOF"
            npx gh-pr-render "$REPO" "$PR_NUMBER"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # WARNING: action is not pinned to a SHA here
      - uses: anthropics/claude-code-action@v1
        with:
          # You can set either of these secrets. If both are set, the API key
          # seems to win.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please take a look at this this pull request. The PR branch is already checked out in the current working directory, and the PR discussion is included below. You may have already reviewed this; if not please review it. If you have reviewed it, please make sure your review is up-to-date.

            - Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight new specific code issues.
            - Use `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments/$ID/replies -X POST -f "body=$BODY"` to post replies to diff comments, replacing `$ID` with the id listed with the diff comment and `$BODY` with the body of your reply.
            - Use `gh pr comment` for top-level feedback. Don’t repeat feedback there that you've already given elsewhere.
            - Only post GitHub comments - don't submit review text as messages.

            ${{ steps.render.outputs.pr_context }}

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Read,Bash(find:*),Bash(grep:*),Bash(git log:*),Bash(git diff:*),Bash(git blame:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh run list:*),Bash(gh run view:*),Bash(gh api:*)"
