name: prek auto-update

on:
  schedule:
    - cron: "0 12 * * 5" # Every Friday at 12:00 UTC (5am PDT / 4am PST).
  workflow_dispatch:

permissions: {}

jobs:
  prek-auto-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # zizmor: ignore[artipacked] no archive; needed for git
          persist-credentials: true
      - uses: taiki-e/install-action@13608cbb45b01feb47ef444ab1a42dc41ad56f1a # v2.79.11
        with:
          tool: prek
      - run: prek auto-update
      - name: Open PR if changed
        run: |
          if [[ -z $(git status --porcelain) ]]; then
            exit 0
          fi

          BRANCH="prek-auto-update"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m '`prek auto-update`'
          git push -u origin "$BRANCH" --force

          if ! gh pr list --head "$BRANCH" --state open --json number --jq '.[0]' | grep -q .; then
            gh pr create \
              --title '`prek auto-update`' \
              --body 'Automated weekly update from `prek auto-update`.'
          fi
        env:
          GH_TOKEN: ${{ github.token }}
